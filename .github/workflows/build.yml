name: Build & Release Windows

# 触发条件：
# 1. 推送 v* 开头的 tag（如 v1.0.1）→ 自动构建并发布到 Release
# 2. 手动触发（在 GitHub Actions 页面点 Run workflow）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号（如 v1.0.1，必须与 package.json 一致）'
        required: true
        default: 'v1.0.1'

# 在 Actions 页面手动取消正在运行的构建
concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # 发布 Release 需要

jobs:
  build:
    name: Build Windows zip + installer
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 配置 npm 国内镜像（加速依赖安装）
        run: npm config set registry https://registry.npmmirror.com

      - name: 设置 Electron 国内镜像
        shell: pwsh
        run: |
          "ELECTRON_MIRROR=https://npmmirror.com/mirrors/electron/" >> $env:GITHUB_ENV
          "ELECTRON_BUILDER_BINARIES_MIRROR=https://npmmirror.com/mirrors/electron-builder-binaries/" >> $env:GITHUB_ENV
          Write-Host "ELECTRON_MIRROR = $env:ELECTRON_MIRROR"

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 类型检查 + 前端构建
        run: npm run build

      - name: 打包 Windows 解压即用 zip + NSIS 安装包
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false

      - name: 列出 release 目录所有产物
        shell: pwsh
        run: |
          Write-Host "=== release 目录 ==="
          Get-ChildItem -Path release -Recurse -File | ForEach-Object {
            $sizeMb = [math]::Round($_.Length / 1MB, 2)
            Write-Host ("{0,-70} {1,10} MB" -f $_.FullName.Replace("$pwd\", ""), $sizeMb)
          }

      - name: 计算版本号与 tag
        id: version
        shell: pwsh
        run: |
          # 优先用触发的 tag，其次用 workflow_dispatch 输入，最后从 package.json 读
          if ($env:GITHUB_REF -match 'refs/tags/(v.*)') {
            $tag = $matches[1]
          } elseif ("${{ github.event.inputs.tag }}") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $tag = "v" + $pkg.version
          }
          $ver = $tag.TrimStart('v')
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "ver=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Tag: $tag, Version: $ver"

      - name: 上传构建产物到 Action Artifacts（备份）
        uses: actions/upload-artifact@v4
        with:
          name: AI写小说-${{ steps.version.outputs.ver }}
          path: |
            release/*.zip
            release/*.exe
          retention-days: 30
          if-no-files-found: error

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AI写小说 ${{ steps.version.outputs.tag }}
          body: |
            # AI写小说 ${{ steps.version.outputs.tag }}

            ## 🎉 主要功能

            ### AI 协作创作
            - **AI 提问 ABCD**：AI 创作时给出 ABC 三个候选方向 + D 自定义，点击选项一键作答
            - **智能提问模式**：三档可切换（智能提问/每段提问/不提问），智能模式只在卡壳时才问
            - **@ 关联**：输入 `@` 关联角色/地点/设定/章节，自动注入 AI 上下文
            - **技能库**：去 AI 味、硬核战斗、多视角评章、文风模仿、扫榜拆解、联网资料补全

            ### 编辑器
            - **Tiptap 富文本**：撤销/重做、加粗/斜体/删除线、H2/H3、引用、列表
            - **章节概要**：AI 自动总结，可一键收起（小箭头切换）让出编辑空间
            - **批量概要**：批量生成所有章节摘要
            - **AI 拆书 / 审稿 / 消痕 / 错别字检查 / 智能排版 / 时光机**：顶部一键调用

            ### 项目管理
            - **书架**：卡片式展示，按更新/创建/书名排序，类型/状态筛选
            - **角色 / 地点 / 设定 / 时间线 / 故事画布**：完整世界观管理
            - **多项目模板**：玄幻/都市/科幻/历史/言情等内置模板

            ### 主题与外观
            - **三档主题**：浅色 / 深色 / 跟随系统
            - **书架页右上角快捷切换按钮**：一键循环切换
            - **字体大小实时预览**：拖动滑块即时生效
            - **窗口无菜单栏**：去除文件/编辑/视图/帮助，更清爽

            ### 软件更新
            - **多镜像源**：api.github.com + ghproxy 镜像，国内访问更稳定
            - **8 秒超时** + **30 秒无数据超时**：避免长时间挂起
            - **下载加速**：直链失败自动切换 ghproxy
            - **失败引导**：网络错误时提示"前往发布页手动下载"

            ### 导出
            - Markdown / HTML / EPUB / DOCX / PDF

            ## 📥 下载说明

            ### 方式一：解压即用（推荐，无需安装）
            1. 下载 `AI-Novel-Writer-${{ steps.version.outputs.ver }}-x64.zip`
            2. 解压到任意目录（如 `D:\AI写小说`）
            3. 双击解压出来的 `AI写小说.exe` 直接运行，无需安装

            ### 方式二：安装版
            1. 下载 `AI-Novel-Writer-Setup-${{ steps.version.outputs.ver }}.exe`
            2. 双击运行，按提示完成安装
            3. 安装完成后，桌面会出现「AI写小说」快捷方式

            ## 🔧 使用前准备
            - 首次启动后，进入「设置」页面配置 AI API Key
            - 支持 OpenAI / DeepSeek / 智谱 / 月之暗面 / 通义千问 / OpenRouter 等主流模型

            ## 📂 完整源码
            https://github.com/3960922808-jpg/ai-novel-writer

            ## 📝 更新历史
            - v1.1.x：AI 提问 ABCD + @ 关联 + 主题优化 + 智能提问 + 更新优化 + 章节概要收起 + 图标修复 + 去菜单栏 + 删除项目修复 + 保存修复 + 网络重试
            - v1.0.x：解压即用 + GitHub Actions 自动打包 + NSIS 安装版
          files: |
            release/*.zip
            release/*.exe
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
